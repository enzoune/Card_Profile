<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=7">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <meta name="author" content="Enzo Hideaki Une">
    <meta name="description" content="Cartão de Perfil para treinar HTML e CSS">
    <meta name="keywords" content="Cartão, Perfil, HTML, CSS">
    <meta name="robots" content="index, follow">

    <title>Cartão de Perfil</title>

    <link href="https://unpkg.com/boxicons@2.1.2/css/boxicons.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="css/style.css">
    <link rel="shortcut icon" href="img/icon.png" type="image/x-icon">
</head>

<body>
    <div class="profile-card">
        <div class="image">
            <img src="img/profile.png" alt="Foto de perfil" class="profile-img">
        </div>

        <div class="text-data">
            <span class="name">Enzo Une</span>
            <span class="job">Desenvolvedor Full-Stack</span>
        </div>

        <div class="media-buttons">
            <a href="#" class="link" id="facebook_link">
                <i class="bx bxl-facebook"></i>
            </a>
            <a href="#" class="link" id="github_link">
                <i class="bx bxl-github"></i>
            </a>
            <a href="#" class="link" id="instagram_link">
                <i class="bx bxl-instagram"></i>
            </a> 
            <a href="#" class="link" id="linkedin_link">
                <i class="bx bxl-linkedin"></i>
            </a>
        </div>

        <div class="buttons">
            <button class="button">Inscrever-se</button>
            <button class="button">Mensagem</button>
        </div>

        <div class="analytics">
            <div class="data">
                <i class='bx bx-heart'></i>
                <span class="number">93</span>
            </div>
            <div class="data">
                <i class='bx bx-message-rounded'></i>
                <span class="number">16</span>
            </div>
            <div class="data">
                <i class='bx bx-share'></i>
                <span class="number">12</span>
            </div>
        </div>
    </div>
</body>

</html>
